{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "seqtoid-pipeline-runner.serviceAccountName" . }}
  labels:
    {{- include "seqtoid-pipeline-runner.labels" . | nindent 4 }}
{{- end }}
{{- if .Values.rbac.create }}
---
{{- /* CZID-72: miniwdl's Kubernetes backend creates a Job (and its pods) per WDL task and tails
       their logs. The runner SA needs exactly that — namespaced, least-privilege (no cluster-wide). */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "seqtoid-pipeline-runner.fullname" . }}
  labels:
    {{- include "seqtoid-pipeline-runner.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "seqtoid-pipeline-runner.fullname" . }}
  labels:
    {{- include "seqtoid-pipeline-runner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "seqtoid-pipeline-runner.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "seqtoid-pipeline-runner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
